name: Windows CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Files
        run: dir

      - name: Verify index.html
        shell: powershell
        run: |
          if (!(Test-Path index.html)) {
            Write-Error "index.html missing"
            exit 1
          }

      - name: Verify one.txt
        shell: powershell
        run: |
          if (!(Test-Path one.txt)) {
            Write-Error "one.txt missing"
            exit 1
          }

      - name: Success
        run: echo "Pipeline Passed"